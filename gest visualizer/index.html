<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.24.0/cytoscape.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        #dropzone {
            padding: 10px;
            background: #f0f0f0;
            cursor: pointer;
            border: 2px dashed #ccc;
            text-align: center;
        }
        #toggle-buttons {
            padding: 5px;
            text-align: center;
        }
        button {
            margin: 5px;
            padding: 8px;
            cursor: pointer;
        }
        #cy {
            flex: 1;
            width: 100%;
            height: calc(100vh - 80px);
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Graph Visualization</h1>
    <div id="dropzone">Click or drop a JSON file here</div>
    <div id="toggle-buttons"></div>
    <div id="cy"></div>
    <script src="./script.js"></script>
</body>
</html>
